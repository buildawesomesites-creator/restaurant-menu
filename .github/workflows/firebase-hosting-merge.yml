name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          # Ensure this secret name matches what you set in GitHub Settings
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_AWESOMEFOODMENU }}
          channelId: live
          # Updated to your project ID
          projectId: awesomefoodmenu
          
